name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      bot: ${{ steps.filter.outputs.bot }}
      webhook: ${{ steps.filter.outputs.webhook }}
      gateway: ${{ steps.filter.outputs.gateway }}
      zapi: ${{ steps.filter.outputs.zapi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            auth:
              - 'chatbot-auth-service/**'
            bot:
              - 'chatbot-bot-service/**'
            webhook:
              - 'chatbot-webhook-service/**'
            gateway:
              - 'chatbot-lambda-gateway/**'
            zapi:
              - 'chatbot-zapi-service/**'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: chatbot-auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
          - service: chatbot-bot-service
            changed: ${{ needs.detect-changes.outputs.bot }}
          - service: chatbot-webhook-service
            changed: ${{ needs.detect-changes.outputs.webhook }}
          - service: chatbot-lambda-gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
          - service: chatbot-zapi-service
            changed: ${{ needs.detect-changes.outputs.zapi }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: matrix.changed == 'true'
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ env.ECR_REGISTRY }}/chatbot/${{ matrix.service }}

          docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest ./${{ matrix.service }}
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

      - name: Update k8s manifest with new image tag
        if: matrix.changed == 'true' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|:latest|:$IMAGE_TAG|g" chatbot-k8s/manifests/${{ matrix.service }}.yaml

      - name: Commit updated manifest
        if: matrix.changed == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add chatbot-k8s/manifests/${{ matrix.service }}.yaml
          git commit -m "ci: update ${{ matrix.service }} image to ${{ github.sha }}" || echo "No changes"
          git push
