apiVersion: v1
kind: Namespace
metadata:
  name: chatbot
---
# ATENÇÃO: Não commitar esse arquivo com valores reais!
# Use: kubectl apply -f namespace-secrets.yaml após preencher os valores
# Ou use AWS Secrets Manager + External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: chatbot
type: Opaque
stringData:
  DATABASE_URL: "postgresql://chatbot:SENHA@RDS_ENDPOINT:5432/chatbot_manager"
  JWT_SECRET: "seu-jwt-secret-aqui"
  OPENAI_KEY: "sk-proj-..."
  CLAUDE_KEY: "sk-ant-..."
  ZAPI_TOKEN: "seu-zapi-token"
  ZAPI_SECURITY_TOKEN: "seu-zapi-security-token"
  EVOLUTION_URL: "https://seu-evolution-url"
  EVOLUTION_KEY: "sua-evolution-key"
