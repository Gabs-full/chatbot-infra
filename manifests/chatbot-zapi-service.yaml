apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-zapi-service
  namespace: chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-zapi-service
  template:
    metadata:
      labels:
        app: chatbot-zapi-service
    spec:
      containers:
        - name: chatbot-zapi-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/chatbot/chatbot-zapi-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: DATABASE_URL
            - name: ZAPI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: ZAPI_TOKEN
            - name: ZAPI_SECURITY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: ZAPI_SECURITY_TOKEN
            - name: EVOLUTION_URL
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: EVOLUTION_URL
            - name: EVOLUTION_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: EVOLUTION_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-zapi-service
  namespace: chatbot
spec:
  selector:
    app: chatbot-zapi-service
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-zapi-service-hpa
  namespace: chatbot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-zapi-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
