apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-bot-service
  namespace: chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-bot-service
  template:
    metadata:
      labels:
        app: chatbot-bot-service
    spec:
      containers:
        - name: chatbot-bot-service
          image: 167506318540.dkr.ecr.us-east-1.amazonaws.com/chatbot-bot-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: DATABASE_URL
            - name: OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: OPENAI_KEY
            - name: CLAUDE_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: CLAUDE_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-bot-service
  namespace: chatbot
spec:
  selector:
    app: chatbot-bot-service
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-bot-service-hpa
  namespace: chatbot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-bot-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70